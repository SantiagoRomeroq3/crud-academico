name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (JS/CSS/HTML)
        run: npm run lint

      - name: Tests (placeholder)
        run: npm test

      - name: Package artifact (zip)
        run: |
          mkdir -p artifact
          zip -r artifact/proyecto.zip . -x "artifact/*" "node_modules/*" ".git/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proyecto
          path: artifact/proyecto.zip
