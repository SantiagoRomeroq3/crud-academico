<body>

    <section id="Register" class="main-banner" style="background: url('images/banner-01.jpg')">

        <div class="formRegister">

            <form class="form-detail" method="post" onsubmit="Register(event)">

                <h2 class="wow flipInX">Registro académico</h2>
                <p class="text-muted" style="max-width:420px; margin: -30px auto 30px auto;">Crea tu cuenta y selecciona tu rol académico.</p>

                <div class="form-row">
                    <input type="text" name="full-name" id="full-name" class="input-text" placeholder="Nombre completo" style="width:100%;">
                </div>

                <div class="form-row">
                    <input type="text" name="username" id="username" class="input-text" placeholder="Correo institucional" style="width:100%;">
                </div>

                <div class="form-row">
                    <input type="password" name="password" id="password" class="input-text" placeholder="Contrasena" style="width:100%;">
                </div>

                <div class="form-row">
                    <input type="password" name="comfirm-password" id="comfirm-password" class="input-text" placeholder="Confirmar contrasena" style="width:100%;">
                </div>

                <div class="form-row">
                    <label class="form-label" for="role">Rol académico</label>
                    <select id="role" name="Validity" style="width:100%; height:45px;">

                        <option value="student" selected>
                            Estudiante
                        </option>

                        <option value="teacher">
                            Docente
                        </option>

                    </select>
                </div>

                <div class="form-row-btn wow rollIn">
                    <input type="submit" name="register" class="register" value="Crear cuenta">
                </div>

            </form>

        </div>

    </section>
